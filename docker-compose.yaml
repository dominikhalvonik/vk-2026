services:
  apache:
    build:
      context: .
      dockerfile: config/apache/Dockerfile
    ports:
      - "8080:80"
    networks:
      - backend
    volumes:
      - apache_data:/var/www/html

  mysql:
    image: mysql:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    networks:
      - backend
    volumes:
      - mysql_data:/var/lib/mysql


networks:
  backend:
    driver: bridge

volumes:
  apache_data:
  mysql_data: